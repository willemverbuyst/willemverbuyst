name: Greeting Visitor
on:
  workflow_dispatch:
    inputs:
      name:
        description: "Your name"
        required: true
        type: string
      origin:
        description: "Where are you from?"
        required: true
        type: string

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting Visitor
        run: echo "Hello ${{ github.event.inputs.name }} from ${{ github.event.inputs.origin }}! Welcome to my GitHub account!"
